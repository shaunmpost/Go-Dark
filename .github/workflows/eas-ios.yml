name: EAS iOS → TestFlight

# Manual trigger (from the GitHub Actions tab, works on mobile).
on:
  workflow_dispatch:
    inputs:
      submit:
        description: Submit to TestFlight after the build
        type: boolean
        default: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      EAS_BUILD_NO_EXPO_GO_WARNING: "true"
      # Apple Developer login for generating the iOS signing certificate +
      # provisioning profile non-interactively (app-specific password avoids 2FA).
      EXPO_APPLE_ID: ${{ secrets.APPLE_ID }}
      EXPO_APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
      EXPO_APPLE_TEAM_ID: CNTZQ8CG4W
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Initialize EAS project
        run: eas init --non-interactive --force

      - name: Write App Store Connect API key
        env:
          ASC_KEY_P8: ${{ secrets.ASC_KEY_P8 }}
        run: printf '%s' "$ASC_KEY_P8" > "$GITHUB_WORKSPACE/asc_api_key.p8"

      - name: Build (and submit) iOS
        run: |
          if [ "${{ inputs.submit }}" = "true" ]; then
            eas build --platform ios --profile production --non-interactive --auto-submit
          else
            eas build --platform ios --profile production --non-interactive
          fi
